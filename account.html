<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Account — MuseoDavao</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-hero">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Home</a> / Account</div>
    <h1 id="accWelcome">My Account</h1>
  </div>
</div>

<section>
  <div class="container">
    <div class="section-head"><div><h2 style="font-size:1.4rem;">My Orders</h2></div>
      <button class="btn-sm-outline" id="logoutBtn">Log out</button>
    </div>
    <table>
      <thead><tr><th>Order No.</th><th>Date</th><th>Fulfillment</th><th>Total</th><th>Status</th><th>Receipt</th></tr></thead>
      <tbody id="ordersBody"><tr><td colspan="6">Loading…</td></tr></tbody>
    </table>
  </div>
</section>

<script>window.MD_PAGE = "account";</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/cart.js"></script>
<script src="js/chatbot.js"></script>
<script src="js/layout.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", async () => {
    const profile = await md_requireAuth({ adminOnly: false });
    if (!profile) return;
    document.getElementById("accWelcome").textContent = `Welcome, ${profile.full_name || profile.email}`;
    document.getElementById("logoutBtn").addEventListener("click", md_signOut);

    const { data, error } = await supabase.from("orders").select("*").eq("user_id", profile.id).order("created_at", { ascending: false });
    const body = document.getElementById("ordersBody");
    if (error) { body.innerHTML = `<tr><td colspan="6">Couldn't load orders.</td></tr>`; return; }
    if (!data || data.length === 0) { body.innerHTML = `<tr><td colspan="6">No orders yet — visit the <a href="shop.html" style="color:var(--brass);">shop</a>.</td></tr>`; return; }
    body.innerHTML = data.map(o => `
      <tr>
        <td>${o.order_no}</td>
        <td>${new Date(o.created_at).toLocaleDateString("en-PH")}</td>
        <td>${o.fulfillment === "online" ? "Delivery" : "Pickup"}</td>
        <td>₱${Number(o.total).toFixed(2)}</td>
        <td><span class="status-pill status-${o.status}">${o.status}</span></td>
        <td><a href="receipt.html?order_no=${o.order_no}" style="color:var(--brass);">View</a></td>
      </tr>`).join("");
  });
</script>
</body>
</html>
